<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התחברות למערכת</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-['Heebo'] min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl border border-slate-200 w-full max-w-md overflow-hidden">
        <div class="bg-slate-800 p-6 text-center text-white">
            <div class="inline-flex bg-indigo-600 p-3 rounded-xl shadow-md mb-3">
                <i class="fa-solid fa-lock text-2xl"></i>
            </div>
            <h1 class="text-xl font-bold">מערכת חיובי מכללה</h1>
            <p class="text-xs text-slate-400 mt-1">אנא הזן פרטי גישה להמשך</p>
        </div>

        <form id="login-form" class="p-6 space-y-4">
            <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-600 text-sm p-3 rounded-lg font-medium text-center"></div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">שם משתמש</label>
                <input type="text" id="username" required class="w-full px-3 py-2.5 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">סיסמה</label>
                <input type="password" id="password" required class="w-full px-3 py-2.5 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-lg transition-colors flex justify-center items-center gap-2">
                <span id="btn-text">התחבר למערכת</span>
                <i class="fa-solid fa-right-to-bracket" id="btn-icon"></i>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('error-msg');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            
            errorMsg.classList.add('hidden');
            submitBtn.disabled = true;
            btnText.textContent = 'מתחבר...';
            btnIcon.className = 'fa-solid fa-circle-notch fa-spin';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                if (res.ok && data.success) {
                    window.location.href = '/'; 
                } else {
                    errorMsg.textContent = data.message || 'שגיאה בהתחברות';
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.textContent = 'אירעה שגיאת תקשורת עם השרת';
                errorMsg.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'התחבר למערכת';
                btnIcon.className = 'fa-solid fa-right-to-bracket';
            }
        });
    </script>
</body>
</html>
