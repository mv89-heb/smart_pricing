<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת חכמה לניהול חיובי מכללה</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Heebo', 'sans-serif'] },
                    colors: { primary: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' } }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        .toast-exit { animation: slideOut 0.3s ease-in forwards; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-100%); opacity: 0; } }
        
        /* סגנונות להדפסה חכמה */
        @media print {
            body { background: white; }
            .print\:hidden { display: none !important; }
            .print\:w-full { width: 100% !important; grid-column: span 12 / span 12 !important; }
            .print\:shadow-none { box-shadow: none !important; border: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-10 print:hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-primary-600 text-white p-2 rounded-lg shadow-md">
                    <i class="fa-solid fa-chart-line text-xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-900 tracking-tight flex items-center gap-2">
                    ניהול חיובי מכללה
                    <span class="text-xs bg-slate-100 text-slate-500 px-2 py-1 rounded-md font-normal"><i class="fa-solid fa-lock text-[10px] text-green-500"></i> מאובטח</span>
                </h1>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="openDashboard()" class="text-sm font-medium text-slate-700 bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-lg flex items-center gap-2 transition-colors">
                    <i class="fa-solid fa-chart-pie text-primary-500"></i> סיכום חודשי
                </button>
                <button onclick="exportMonthlyReport()" class="text-sm font-medium text-white bg-green-600 hover:bg-green-700 px-4 py-2 rounded-lg flex items-center gap-2 shadow-sm transition-colors">
                    <i class="fa-solid fa-file-excel"></i> יצוא הנה"ח
                </button>
                <a href="/logout" class="text-sm font-medium text-red-600 bg-red-50 hover:bg-red-100 px-3 py-2 rounded-lg flex items-center gap-1.5 transition-colors">
                    <i class="fa-solid fa-right-from-bracket"></i> יציאה
                </a>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full transition-all duration-300">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

            <div id="right-panel" class="lg:col-span-4 flex flex-col gap-6 print:hidden transition-all duration-300">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[calc(100vh-140px)] sticky top-24">
                    
                    <div class="p-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                        <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                            <i class="fa-solid fa-tags text-primary-500"></i> מחירון
                        </h2>
                        <button onclick="bulkUpdatePrices()" class="text-xs font-bold bg-indigo-50 text-indigo-600 hover:bg-indigo-100 px-3 py-1.5 rounded-lg border border-indigo-200 transition-colors flex items-center gap-1" title="עדכון מחירון באחוזים">
                            <i class="fa-solid fa-arrow-trend-up"></i> עדכון גורף
                        </button>
                    </div>

                    <div class="p-5 flex-grow flex flex-col gap-5 overflow-hidden">
                        <form id="product-form" class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">שם המוצר</label>
                                <input type="text" id="prod-name" required class="block w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-primary-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">מחיר יחידה (₪)</label>
                                <input type="number" id="prod-price" step="0.01" required class="block w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-primary-500">
                            </div>
                            <button type="submit" id="product-submit-btn" class="w-full flex justify-center items-center gap-2 py-2.5 px-4 rounded-lg text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 transition-all">
                                <i class="fa-solid fa-plus"></i> שמור למחירון
                            </button>
                        </form>

                        <div class="flex-grow overflow-y-auto border border-slate-200 rounded-xl">
                            <table class="min-w-full divide-y divide-slate-200">
                                <thead class="bg-slate-50 sticky top-0 z-10">
                                    <tr>
                                        <th class="px-4 py-3 text-right text-xs font-semibold text-slate-500">מוצר</th>
                                        <th class="px-4 py-3 text-right text-xs font-semibold text-slate-500">מחיר</th>
                                        <th class="px-4 py-3 text-center text-xs font-semibold text-slate-500"></th>
                                    </tr>
                                </thead>
                                <tbody id="price-list-table-body" class="bg-white divide-y divide-slate-200"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div id="left-panel" class="lg:col-span-8 print:w-full flex flex-col gap-6 print:gap-2 transition-all duration-300">
                
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 flex flex-col sm:flex-row items-center justify-between gap-4 border-r-4 border-r-primary-500 print:shadow-none print:p-0 print:border-r-0">
                    <div class="flex items-center gap-3">
                        <h2 class="text-xl font-bold text-slate-800">דו"ח חיובים יומי</h2>
                        <button onclick="toggleFocusMode()" class="text-slate-400 hover:text-primary-600 transition-colors print:hidden" title="מצב מסך רחב להזנה מהירה">
                            <i class="fa-solid fa-expand"></i>
                        </button>
                        <p class="hidden print:block text-slate-500 font-bold text-lg mt-1" id="print-date-display"></p>
                    </div>
                    <div class="flex items-center gap-3 print:hidden">
                        <button onclick="copyFromYesterday()" class="bg-blue-50 text-blue-600 hover:bg-blue-100 border border-blue-200 px-3 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-colors">
                            <i class="fa-solid fa-copy"></i> העתק מאתמול
                        </button>
                        <input type="date" id="current-date" onchange="loadEntriesForDate()" class="block w-full sm:w-48 px-4 py-2 border-2 border-primary-100 rounded-xl font-bold text-primary-700 bg-primary-50 outline-none cursor-pointer">
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex-grow flex flex-col print:shadow-none print:border-0">
                    
                    <div class="p-6 border-b border-slate-100 bg-slate-50/50 print:hidden">
                        <form id="entry-form" class="flex flex-col sm:flex-row items-start sm:items-end gap-4">
                            <div class="w-full sm:w-2/5">
                                <label class="block text-sm font-medium text-slate-700 mb-1">מוצר שנצרך</label>
                                <select id="entry-prod-select-ui" required class="w-full" onchange="updateLivePreview()">
                                    <option value="">בחר מוצר...</option>
                                </select>
                            </div>
                            
                            <div class="w-full sm:w-1/5">
                                <label class="block text-sm font-medium text-slate-700 mb-1">כמות</label>
                                <input type="number" id="entry-qty" step="0.01" value="1" min="0.01" required class="block w-full py-2.5 px-3 border border-slate-300 rounded-lg outline-none text-center focus:ring-2 focus:ring-primary-500" oninput="updateLivePreview()">
                                <p id="live-preview-box" class="text-xs text-primary-600 font-bold mt-1 text-center h-4"></p>
                            </div>
                            
                            <div class="w-full sm:w-1/5 pb-5 sm:pb-6 flex items-center justify-center">
                                <label class="flex items-center gap-2 cursor-pointer text-sm font-bold text-orange-600 bg-orange-50 px-3 py-2 rounded-lg border border-orange-200 hover:bg-orange-100 transition-colors">
                                    <input type="checkbox" id="entry-is-extra" class="w-4 h-4 text-orange-600 rounded focus:ring-orange-500 cursor-pointer">
                                    חיוב אקסטרה
                                </label>
                            </div>

                            <div class="w-full sm:w-1/5 pb-0 sm:pb-5">
                                <button type="submit" id="entry-submit-btn" class="w-full flex justify-center items-center gap-2 py-2.5 px-4 rounded-lg shadow-sm text-sm font-medium text-white bg-slate-800 hover:bg-slate-900 transition-all">
                                    <i class="fa-solid fa-arrow-down"></i> הוסף
                                </button>
                            </div>
                        </form>
                    </div>

                    <div class="px-6 pt-4 pb-2 print:hidden bg-white">
                        <div class="relative">
                            <i class="fa-solid fa-magnifying-glass absolute right-3 top-3 text-slate-400"></i>
                            <input type="text" id="live-search" onkeyup="filterTable()" placeholder="סנן מוצרים בטבלה זו..." class="w-full pl-3 pr-10 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-primary-400">
                        </div>
                    </div>

                    <div class="flex-grow overflow-x-auto print:overflow-visible min-h-[200px]">
                        <table class="min-w-full divide-y divide-slate-200">
                            <thead class="bg-slate-50 print:bg-white">
                                <tr>
                                    <th class="px-6 py-4 text-right text-sm font-semibold text-slate-600 print:text-black">שם המוצר</th>
                                    <th class="px-6 py-4 text-center text-sm font-semibold text-slate-600 w-24 print:text-black">כמות</th>
                                    <th class="px-6 py-4 text-right text-sm font-semibold text-slate-600 w-32 print:text-black">מחיר יחידה</th>
                                    <th class="px-6 py-4 text-right text-sm font-semibold text-slate-600 w-32 print:text-black">סה"כ</th>
                                    <th class="px-6 py-4 text-center text-sm font-semibold text-slate-600 w-16 print:hidden"></th>
                                </tr>
                            </thead>
                            <tbody id="entries-table-body" class="bg-white divide-y divide-slate-100 print:border-b"></tbody>
                        </table>
                    </div>

                    <div class="bg-slate-800 text-white p-6 flex flex-col sm:flex-row items-center justify-between mt-auto print:bg-white print:text-black print:border-t-2 print:p-2 gap-4">
                        <div class="flex items-center gap-3">
                            <div>
                                <p class="text-slate-300 text-sm font-medium mb-1 print:text-slate-600">סה"כ חיובים לתאריך זה:</p>
                                <p class="text-3xl font-bold text-white print:text-black"><span id="daily-total">0.00</span> ₪</p>
                            </div>
                        </div>
                        <div class="flex gap-3 print:hidden w-full sm:w-auto">
                            <button onclick="shareWhatsApp()" class="flex-1 sm:flex-none bg-green-500 hover:bg-green-600 text-white border border-green-400 px-4 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-colors">
                                <i class="fa-brands fa-whatsapp text-lg"></i> שתף דיווח
                            </button>
                            <button onclick="window.print()" class="flex-1 sm:flex-none bg-white/10 hover:bg-white/20 text-white border border-white/20 px-4 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-colors">
                                <i class="fa-solid fa-print"></i> הדפס
                            </button>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
    </main>

    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none print:hidden"></div>

    <div id="dashboard-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 transition-opacity duration-300 print:hidden">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl overflow-hidden transform scale-95 transition-transform duration-300 flex flex-col max-h-[90vh]" id="dashboard-content">
            <div class="bg-slate-800 p-5 flex justify-between items-center text-white shrink-0">
                <h3 class="text-lg font-bold flex items-center gap-2"><i class="fa-solid fa-chart-pie text-primary-400"></i> סיכום חודשי - <span id="dash-month-title"></span></h3>
                <button onclick="closeDashboard()" class="text-slate-400 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-6 overflow-y-auto">
                
                <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 mb-6">
                    <div class="flex justify-between items-end mb-2">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">תקציב יעד חודשי (₪):</label>
                            <input type="number" id="budget-input" placeholder="לדוג' 10000" oninput="updateBudgetProgress()" class="px-3 py-1 text-sm border rounded-lg w-32 focus:ring-2 focus:ring-primary-500 outline-none bg-white">
                        </div>
                        <div class="text-left text-sm font-bold text-slate-700" id="budget-percentage-text">0% נוצלו</div>
                    </div>
                    <div class="w-full bg-slate-200 h-3 rounded-full overflow-hidden">
                        <div id="budget-progress-bar" class="bg-primary-500 h-full w-0 transition-all duration-500"></div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-primary-50 rounded-xl p-4 border border-primary-100">
                        <p class="text-sm font-medium text-primary-600 mb-1">חיוב שוטף</p>
                        <p class="text-2xl font-bold text-primary-800"><span id="dash-regular-total">0</span> ₪</p>
                    </div>
                    <div class="bg-orange-50 rounded-xl p-4 border border-orange-100">
                        <p class="text-sm font-medium text-orange-600 mb-1">חריגות (אקסטרה)</p>
                        <p class="text-2xl font-bold text-orange-800"><span id="dash-extra-total">0</span> ₪</p>
                    </div>
                </div>
                
                <div class="mb-6 h-48 relative">
                    <canvas id="dashboardChart"></canvas>
                </div>

                <div class="bg-slate-100 rounded-xl p-4 text-center">
                    <p class="text-sm font-medium text-slate-500 mb-1">סה"כ לתשלום החודש</p>
                    <p class="text-4xl font-extrabold text-slate-800"><span id="dash-grand-total">0</span> ₪</p>
                </div>
                
                <button onclick="exportMonthlyReport()" class="w-full mt-6 flex justify-center items-center gap-2 bg-green-600 text-white hover:bg-green-700 py-3 rounded-xl font-bold transition-colors">
                    <i class="fa-solid fa-file-excel"></i> הורד אקסל מלא להנה"ח
                </button>
            </div>
        </div>
    </div>

    <script>
        let products = {};
        let ts; 
        let dashboardChartInstance = null; 
        let currentGrandTotal = 0; // נשמר עבור מד התקציב
        
        const today = new Date();
        const dateStr = new Date(today.getTime() - (today.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        document.getElementById('current-date').value = dateStr;

        // טעינת תקציב שמור עם פתיחת המערכת
        const savedBudget = localStorage.getItem('monthly_budget');
        if (savedBudget) {
            document.getElementById('budget-input').value = savedBudget;
        }

        function formatMoney(amount) {
            return amount.toLocaleString('he-IL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        async function apiFetch(url, options = {}) {
            try {
                const res = await fetch(url, options);
                if (res.status === 401) {
                    window.location.href = '/login'; 
                    return null;
                }
                return res;
            } catch (err) {
                showToast('שגיאת תקשורת', 'error');
                return null;
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const icon = type === 'success' ? '<i class="fa-solid fa-circle-check text-green-500"></i>' : '<i class="fa-solid fa-triangle-exclamation text-red-500"></i>';
            const bgColor = type === 'success' ? 'bg-white border-green-100' : 'bg-white border-red-100';
            
            toast.className = `toast-enter flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg border ${bgColor} pointer-events-auto`;
            toast.innerHTML = `${icon} <span class="font-medium text-sm text-slate-800">${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        async function loadProducts() {
            const res = await apiFetch('/api/products');
            if (!res) return;
            products = await res.json();
            renderProducts();
            loadEntriesForDate();
        }

        function renderProducts() {
            const tbody = document.getElementById('price-list-table-body');
            const select = document.getElementById('entry-prod-select-ui');
            
            tbody.innerHTML = '';
            if (ts) { ts.destroy(); ts = null; }
            select.innerHTML = '<option value="">בחר מוצר...</option>';

            Object.keys(products).sort().forEach(name => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 group">
                        <td class="px-4 py-3 text-sm font-medium text-slate-800">${name}</td>
                        <td class="px-4 py-3 text-sm text-slate-600">${formatMoney(products[name])} ₪</td>
                        <td class="px-4 py-3 text-center">
                            <button onclick="deleteProduct('${name}')" class="text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition-opacity"><i class="fa-solid fa-trash-can"></i></button>
                        </td>
                    </tr>`;
                
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                select.appendChild(opt);
            });

            ts = new TomSelect("#entry-prod-select-ui", {
                create: false,
                sortField: { field: "text", direction: "asc" },
                onChange: function() { updateLivePreview(); } // תמיכה בחישוב חי בבחירה
            });
        }

        async function bulkUpdatePrices() {
            if (Object.keys(products).length === 0) return showToast('המחירון ריק.', 'error');
            const percentStr = prompt('הזן אחוז לעדכון גורף של כל המחירון (לדוגמה: 5, -5):');
            if (!percentStr) return; 
            const percent = parseFloat(percentStr);
            if (isNaN(percent)) return showToast('נא להזין מספר תקין', 'error');
            if (!confirm(`האם לעדכן את כל ${Object.keys(products).length} המוצרים ב-${percent}%?`)) return;

            showToast('מעדכן מחירים...', 'success');
            let successCount = 0;
            
            for (const [name, oldPrice] of Object.entries(products)) {
                const newPrice = Math.round(oldPrice * (1 + (percent / 100)) * 100) / 100;
                const res = await apiFetch('/api/products', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ name: name, price: newPrice }) 
                });
                if (res && res.ok) successCount++;
            }
            showToast(`עודכנו ${successCount} מוצרים!`);
            loadProducts(); 
        }

        document.getElementById('product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('product-submit-btn');
            btn.disabled = true;
            const name = document.getElementById('prod-name').value.trim();
            const price = parseFloat(document.getElementById('prod-price').value);
            
            const res = await apiFetch('/api/products', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ name, price }) 
            });
            btn.disabled = false;
            if (res && res.ok) {
                document.getElementById('product-form').reset();
                showToast(`"${name}" נשמר במחירון!`);
                loadProducts();
            }
        });

        async function deleteProduct(name) {
            if(confirm(`למחוק את "${name}" מהמחירון?`)) {
                const res = await apiFetch(`/api/products/${name}`, { method: 'DELETE' });
                if (res && res.ok) {
                    showToast(`"${name}" נמחק!`);
                    loadProducts();
                }
            }
        }

        async function loadEntriesForDate() {
            const date = document.getElementById('current-date').value;
            if (!date) return;
            
            const dateParts = date.split('-');
            document.getElementById('print-date-display').textContent = `תאריך: ${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
            document.getElementById('live-search').value = '';

            const res = await apiFetch(`/api/entries/${date}`);
            if (res) renderEntries(await res.json());
        }

        function renderEntries(entries) {
            const tbody = document.getElementById('entries-table-body');
            tbody.innerHTML = '';
            let total = 0;

            entries.forEach(entry => {
                const price = products[entry.product_name] || 0;
                const itemTotal = price * entry.quantity;
                total += itemTotal;
                
                const extraTag = entry.is_extra ? `<span class="ml-2 text-[10px] bg-orange-100 text-orange-700 px-2 py-1 rounded-full font-bold border border-orange-200">אקסטרה</span>` : '';

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 ${entry.is_extra ? 'bg-orange-50/30' : ''} table-row-item">
                        <td class="px-6 py-4 text-sm font-semibold text-slate-800 print:text-black print:p-2 product-name-cell">${entry.product_name} ${extraTag}</td>
                        <td class="px-6 py-4 text-sm text-slate-700 text-center font-medium print:text-black print:p-2">${entry.quantity}</td>
                        <td class="px-6 py-4 text-sm text-slate-600 text-right print:text-black print:p-2">${formatMoney(price)} ₪</td>
                        <td class="px-6 py-4 text-sm font-bold text-primary-700 text-right print:text-black print:p-2">${formatMoney(itemTotal)} ₪</td>
                        <td class="px-6 py-4 text-center print:hidden">
                            <button onclick="deleteEntry(${entry.id})" class="text-red-400 hover:text-red-600 transition-colors"><i class="fa-solid fa-xmark text-lg"></i></button>
                        </td>
                    </tr>`;
            });
            document.getElementById('daily-total').textContent = formatMoney(total);
        }

        // פיצ'ר חדש: מצב פוקוס
        function toggleFocusMode() {
            const rightPanel = document.getElementById('right-panel');
            const leftPanel = document.getElementById('left-panel');
            if (rightPanel.classList.contains('hidden')) {
                rightPanel.classList.remove('hidden');
                leftPanel.classList.remove('lg:col-span-12');
                leftPanel.classList.add('lg:col-span-8');
            } else {
                rightPanel.classList.add('hidden');
                leftPanel.classList.remove('lg:col-span-8');
                leftPanel.classList.add('lg:col-span-12');
            }
        }

        // פיצ'ר חדש: חישוב מקדים בזמן אמת
        function updateLivePreview() {
            const prodName = document.getElementById('entry-prod-select-ui').value;
            const qty = parseFloat(document.getElementById('entry-qty').value) || 0;
            const previewBox = document.getElementById('live-preview-box');
            
            if (prodName && products[prodName] && qty > 0) {
                const total = products[prodName] * qty;
                previewBox.textContent = `= ${formatMoney(total)} ₪`;
            } else {
                previewBox.textContent = '';
            }
        }

        // פיצ'ר חדש: ייצוא לוואטסאפ
        function shareWhatsApp() {
            const dateStr = document.getElementById('print-date-display').textContent.replace('תאריך: ', '');
            const total = document.getElementById('daily-total').textContent;
            
            let msg = `*דוח חיובי מכללה יומי* 📊\nתאריך: ${dateStr}\n\n`;
            msg += `סה"כ הוצאות ליום זה: *${total} ₪*\n\n`;
            msg += `_הופק אוטומטית ממערכת הניהול_`;
            
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function filterTable() {
            const input = document.getElementById('live-search').value.toLowerCase();
            const rows = document.querySelectorAll('.table-row-item');
            rows.forEach(row => {
                const text = row.querySelector('.product-name-cell').textContent.toLowerCase();
                if(text.includes(input)) row.style.display = '';
                else row.style.display = 'none';
            });
        }

        async function copyFromYesterday() {
            const currentStr = document.getElementById('current-date').value;
            if (!currentStr) return;
            
            const currentDate = new Date(currentStr);
            const yesterday = new Date(currentDate);
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toISOString().split('T')[0];

            const res = await apiFetch(`/api/entries/${yesterdayStr}`);
            if (!res) return;
            const entries = await res.json();
            
            if (entries.length === 0) return showToast('אין חיובים מאתמול להעתקה', 'error');
            if(!confirm(`האם להעתיק ${entries.length} חיובים מתאריך האתמול?`)) return;

            showToast('מעתיק נתונים...', 'success');
            
            for (const entry of entries) {
                await apiFetch('/api/entries', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        date: currentStr,
                        product_name: entry.product_name,
                        quantity: entry.quantity,
                        is_extra: entry.is_extra
                    })
                });
            }
            showToast('הנתונים הועתקו בהצלחה!');
            loadEntriesForDate();
        }

        document.getElementById('entry-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('entry-submit-btn');
            
            const date = document.getElementById('current-date').value;
            const product_name = document.getElementById('entry-prod-select-ui').value;
            const quantity = document.getElementById('entry-qty').value;
            const is_extra = document.getElementById('entry-is-extra').checked;

            if (!product_name) return showToast('אנא בחר מוצר מתוך הרשימה', 'error');

            btn.disabled = true;
            const res = await apiFetch('/api/entries', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ date, product_name, quantity, is_extra })
            });
            btn.disabled = false;

            if (res && res.ok) {
                document.getElementById('entry-qty').value = 1;
                document.getElementById('entry-is-extra').checked = false;
                document.getElementById('live-preview-box').textContent = '';
                if (ts) ts.clear(); 
                
                showToast('החיוב התווסף בהצלחה!');
                loadEntriesForDate();
            }
        });

        async function deleteEntry(entryId) {
            if(confirm('להסיר חיוב זה מהתאריך הנוכחי?')) {
                const res = await apiFetch(`/api/entries/${entryId}`, { method: 'DELETE' });
                if (res && res.ok) {
                    showToast('החיוב הוסר', 'success');
                    loadEntriesForDate();
                }
            }
        }

        async function fetchMonthlyData() {
            const dateVal = document.getElementById('current-date').value; 
            if(!dateVal) return null;
            const month = dateVal.substring(0, 7); 
            const res = await apiFetch(`/api/report/month/${month}`);
            return res ? { month, entries: await res.json() } : null;
        }

        // פיצ'ר חדש: עדכון מד התקציב
        function updateBudgetProgress() {
            const budgetVal = document.getElementById('budget-input').value;
            localStorage.setItem('monthly_budget', budgetVal);
            
            const bar = document.getElementById('budget-progress-bar');
            const text = document.getElementById('budget-percentage-text');
            
            if (!budgetVal || budgetVal <= 0 || currentGrandTotal === 0) {
                bar.style.width = '0%';
                bar.className = 'bg-primary-500 h-full transition-all duration-500';
                text.textContent = 'הזן תקציב לחישוב';
                return;
            }

            const percentage = (currentGrandTotal / budgetVal) * 100;
            const displayPercent = Math.min(percentage, 100).toFixed(0);
            
            bar.style.width = `${displayPercent}%`;
            text.textContent = `${displayPercent}% נוצלו`;

            if (percentage < 75) bar.className = 'bg-green-500 h-full transition-all duration-500';
            else if (percentage < 95) bar.className = 'bg-yellow-500 h-full transition-all duration-500';
            else bar.className = 'bg-red-500 h-full transition-all duration-500';
        }

        async function openDashboard() {
            const data = await fetchMonthlyData();
            if(!data || data.entries.length === 0) {
                return showToast('אין נתונים להצגה בחודש זה', 'error');
            }

            let regularTotal = 0;
            let extraTotal = 0;

            data.entries.forEach(e => {
                const price = products[e.product_name] || 0;
                const total = price * e.quantity;
                if(e.is_extra) extraTotal += total;
                else regularTotal += total;
            });

            currentGrandTotal = regularTotal + extraTotal;

            document.getElementById('dash-month-title').textContent = data.month;
            document.getElementById('dash-regular-total').textContent = formatMoney(regularTotal);
            document.getElementById('dash-extra-total').textContent = formatMoney(extraTotal);
            document.getElementById('dash-grand-total').textContent = formatMoney(currentGrandTotal);

            updateBudgetProgress(); // עדכון פס התקציב בעת פתיחת החלון

            const ctx = document.getElementById('dashboardChart').getContext('2d');
            if (dashboardChartInstance) dashboardChartInstance.destroy();
            
            dashboardChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['הוצאות שוטפות', 'חריגות אקסטרה'],
                    datasets: [{
                        data: [regularTotal, extraTotal],
                        backgroundColor: ['#4f46e5', '#f97316'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { font: { family: 'Heebo' } } } }
                }
            });

            const modal = document.getElementById('dashboard-modal');
            const content = document.getElementById('dashboard-content');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            }, 10);
        }

        function closeDashboard() {
            const modal = document.getElementById('dashboard-modal');
            const content = document.getElementById('dashboard-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        async function exportMonthlyReport() {
            const data = await fetchMonthlyData();
            if(!data || data.entries.length === 0) return showToast('אין נתונים להפקת דוח', 'error');

            let csvContent = '\uFEFFתאריך,סוג חיוב,שם המוצר,כמות,מחיר יחידה (ש"ח),סה"כ לתשלום (ש"ח)\n';
            data.entries.sort((a,b) => a.date.localeCompare(b.date));

            let regularTotal = 0, extraTotal = 0;

            data.entries.forEach(e => {
                const price = products[e.product_name] || 0;
                const total = price * e.quantity;
                const typeStr = e.is_extra ? 'אקסטרה' : 'שוטף';
                if(e.is_extra) extraTotal += total; else regularTotal += total;
                csvContent += `${e.date},${typeStr},${e.product_name},${e.quantity},${price.toFixed(2)},${total.toFixed(2)}\n`;
            });

            csvContent += `\n,,,סיכום חיובי שוטף:,${regularTotal.toFixed(2)}\n`;
            csvContent += `,,,סיכום חיובי אקסטרה:,${extraTotal.toFixed(2)}\n`;
            csvContent += `,,,סה"כ כללי לתשלום:,${(regularTotal + extraTotal).toFixed(2)}\n`;

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `דוח_חיובים_${data.month}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showToast('הדוח ירד בהצלחה!');
            closeDashboard();
        }

        loadProducts();
    </script>
</body>
</html>
