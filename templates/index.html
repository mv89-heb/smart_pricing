<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת חכמה לניהול חיובי מכללה</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Heebo', 'sans-serif'] },
                    colors: { primary: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' } }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-primary-600 text-white p-2 rounded-lg shadow-md">
                    <i class="fa-solid fa-chart-line text-xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-900 tracking-tight">ניהול חיובי מכללה</h1>
            </div>
            <div class="flex gap-3">
                <button onclick="exportMonthlyReport()" class="text-sm font-medium text-white bg-green-600 hover:bg-green-700 px-4 py-2 rounded-lg flex items-center gap-2 shadow-sm transition-colors">
                    <i class="fa-solid fa-file-excel"></i>
                    דוח חודשי לאקסל
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

            <div class="lg:col-span-4 flex flex-col gap-6">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[calc(100vh-140px)] sticky top-24">
                    <div class="p-5 border-b border-slate-100 bg-slate-50/50">
                        <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                            <i class="fa-solid fa-tags text-primary-500"></i>
                            מחירון מוצרים
                        </h2>
                    </div>

                    <div class="p-5 flex-grow flex flex-col gap-5 overflow-hidden">
                        <form id="product-form" class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">שם המוצר</label>
                                <input type="text" id="prod-name" required class="block w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500 outline-none" placeholder="לדוג': קפה מגורען">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">מחיר יחידה (₪)</label>
                                <input type="number" id="prod-price" step="0.01" required class="block w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500 outline-none" placeholder="0.00">
                            </div>
                            <button type="submit" class="w-full flex justify-center items-center gap-2 py-2.5 px-4 rounded-lg shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 transition-all">
                                <i class="fa-solid fa-plus"></i> שמור למחירון
                            </button>
                        </form>

                        <div class="flex-grow overflow-y-auto border border-slate-200 rounded-xl">
                            <table class="min-w-full divide-y divide-slate-200">
                                <thead class="bg-slate-50 sticky top-0 z-10">
                                    <tr>
                                        <th class="px-4 py-3 text-right text-xs font-semibold text-slate-500">מוצר</th>
                                        <th class="px-4 py-3 text-right text-xs font-semibold text-slate-500">מחיר</th>
                                        <th class="px-4 py-3 text-center text-xs font-semibold text-slate-500"></th>
                                    </tr>
                                </thead>
                                <tbody id="price-list-table-body" class="bg-white divide-y divide-slate-200"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 flex flex-col gap-6">
                
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 flex flex-col sm:flex-row items-center justify-between gap-4 border-r-4 border-r-primary-500">
                    <div>
                        <h2 class="text-xl font-bold text-slate-800">הזנת נתונים שוטפת</h2>
                    </div>
                    <div>
                        <input type="date" id="current-date" onchange="loadEntriesForDate()" class="block w-full sm:w-64 px-4 py-3 border-2 border-primary-100 rounded-xl font-bold text-primary-700 bg-primary-50 outline-none cursor-pointer">
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex-grow flex flex-col">
                    
                    <div class="p-6 border-b border-slate-100 bg-slate-50/50">
                        <form id="entry-form" class="flex flex-col sm:flex-row items-end gap-4">
                            <div class="w-full sm:w-2/5">
                                <label class="block text-sm font-medium text-slate-700 mb-1">מוצר שנצרך</label>
                                <select id="entry-prod-select" required class="block w-full py-2.5 px-3 border border-slate-300 rounded-lg outline-none cursor-pointer bg-white">
                                    <option value="">-- טוען מוצרים... --</option>
                                </select>
                            </div>
                            <div class="w-full sm:w-1/5">
                                <label class="block text-sm font-medium text-slate-700 mb-1">כמות</label>
                                <input type="number" id="entry-qty" step="0.01" value="1" min="0.01" required class="block w-full py-2.5 px-3 border border-slate-300 rounded-lg outline-none text-center">
                            </div>
                            
                            <div class="w-full sm:w-1/5 pb-2 flex items-center justify-center">
                                <label class="flex items-center gap-2 cursor-pointer text-sm font-bold text-orange-600 bg-orange-50 px-3 py-2 rounded-lg border border-orange-200 hover:bg-orange-100 transition-colors">
                                    <input type="checkbox" id="entry-is-extra" class="w-4 h-4 text-orange-600 rounded focus:ring-orange-500 cursor-pointer">
                                    חיוב אקסטרה
                                </label>
                            </div>

                            <div class="w-full sm:w-1/5">
                                <button type="submit" class="w-full flex justify-center items-center gap-2 py-2.5 px-4 rounded-lg shadow-sm text-sm font-medium text-white bg-slate-800 hover:bg-slate-900 transition-all">
                                    <i class="fa-solid fa-arrow-down"></i> הוסף
                                </button>
                            </div>
                        </form>
                    </div>

                    <div class="flex-grow overflow-x-auto">
                        <table class="min-w-full divide-y divide-slate-200">
                            <thead class="bg-slate-50">
                                <tr>
                                    <th class="px-6 py-4 text-right text-sm font-semibold text-slate-600">שם המוצר</th>
                                    <th class="px-6 py-4 text-center text-sm font-semibold text-slate-600 w-24">כמות</th>
                                    <th class="px-6 py-4 text-right text-sm font-semibold text-slate-600 w-32">מחיר יחידה</th>
                                    <th class="px-6 py-4 text-right text-sm font-semibold text-slate-600 w-32">סה"כ</th>
                                    <th class="px-6 py-4 text-center text-sm font-semibold text-slate-600 w-16"></th>
                                </tr>
                            </thead>
                            <tbody id="entries-table-body" class="bg-white divide-y divide-slate-100"></tbody>
                        </table>
                    </div>

                    <div class="bg-slate-800 text-white p-6 flex items-center justify-between mt-auto">
                        <div class="flex items-center gap-3">
                            <div>
                                <p class="text-slate-300 text-sm font-medium mb-1">סה"כ חיובים לתאריך:</p>
                                <p class="text-3xl font-bold text-white"><span id="daily-total">0.00</span> ₪</p>
                            </div>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
    </main>

    <script>
        let products = {};
        document.getElementById('current-date').valueAsDate = new Date();

        async function loadProducts() {
            const res = await fetch('/api/products');
            products = await res.json();
            renderProducts();
            loadEntriesForDate();
        }

        function renderProducts() {
            const tbody = document.getElementById('price-list-table-body');
            const select = document.getElementById('entry-prod-select');
            tbody.innerHTML = '';
            select.innerHTML = '<option value="">-- בחר מוצר --</option>';

            Object.keys(products).sort().forEach(name => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 group">
                        <td class="px-4 py-3 text-sm font-medium text-slate-800">${name}</td>
                        <td class="px-4 py-3 text-sm text-slate-600">${products[name].toFixed(2)} ₪</td>
                        <td class="px-4 py-3 text-center">
                            <button onclick="deleteProduct('${name}')" class="text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100"><i class="fa-solid fa-trash-can"></i></button>
                        </td>
                    </tr>`;
                select.innerHTML += `<option value="${name}">${name}</option>`;
            });
        }

        document.getElementById('product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('prod-name').value.trim();
            const price = parseFloat(document.getElementById('prod-price').value);
            await fetch('/api/products', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name, price }) });
            document.getElementById('product-form').reset();
            loadProducts();
        });

        async function deleteProduct(name) {
            if(confirm(`למחוק את "${name}"?`)) {
                await fetch(`/api/products/${name}`, { method: 'DELETE' });
                loadProducts();
            }
        }

        async function loadEntriesForDate() {
            const date = document.getElementById('current-date').value;
            if (!date) return;
            const res = await fetch(`/api/entries/${date}`);
            renderEntries(await res.json());
        }

        function renderEntries(entries) {
            const tbody = document.getElementById('entries-table-body');
            tbody.innerHTML = '';
            let total = 0;

            entries.forEach(entry => {
                const price = products[entry.product_name] || 0;
                const itemTotal = price * entry.quantity;
                total += itemTotal;
                
                // תגית חזותית לאקסטרה
                const extraTag = entry.is_extra ? `<span class="ml-2 text-[10px] bg-orange-100 text-orange-700 px-2 py-1 rounded-full font-bold border border-orange-200">אקסטרה</span>` : '';

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 ${entry.is_extra ? 'bg-orange-50/20' : ''}">
                        <td class="px-6 py-4 text-sm font-semibold text-slate-800">${entry.product_name} ${extraTag}</td>
                        <td class="px-6 py-4 text-sm text-slate-700 text-center font-medium">${entry.quantity}</td>
                        <td class="px-6 py-4 text-sm text-slate-600 text-right">${price.toFixed(2)} ₪</td>
                        <td class="px-6 py-4 text-sm font-bold text-primary-700 text-right">${itemTotal.toFixed(2)} ₪</td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="deleteEntry(${entry.id})" class="text-red-400 hover:text-red-600"><i class="fa-solid fa-xmark text-lg"></i></button>
                        </td>
                    </tr>`;
            });
            document.getElementById('daily-total').textContent = total.toFixed(2);
        }

        document.getElementById('entry-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const date = document.getElementById('current-date').value;
            const product_name = document.getElementById('entry-prod-select').value;
            const quantity = document.getElementById('entry-qty').value;
            const is_extra = document.getElementById('entry-is-extra').checked;

            await fetch('/api/entries', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ date, product_name, quantity, is_extra })
            });
            
            document.getElementById('entry-qty').value = 1;
            document.getElementById('entry-prod-select').value = '';
            document.getElementById('entry-is-extra').checked = false; // איפוס התיבה
            loadEntriesForDate();
        });

        async function deleteEntry(entryId) {
            if(confirm('להסיר חיוב זה?')) {
                await fetch(`/api/entries/${entryId}`, { method: 'DELETE' });
                loadEntriesForDate();
            }
        }

        // --- פונקציה לייצוא דוח להנהלת חשבונות ---
        async function exportMonthlyReport() {
            const dateVal = document.getElementById('current-date').value; // YYYY-MM-DD
            if(!dateVal) return alert('אנא בחר תאריך קודם');
            
            const month = dateVal.substring(0, 7); // חיתוך לקבלת YYYY-MM
            
            try {
                const res = await fetch(`/api/report/month/${month}`);
                const entries = await res.json();
                
                if (entries.length === 0) {
                    return alert('אין נתונים להפקת דוח בחודש זה.');
                }

                // הוספת BOM כדי שהעברית תוצג טוב באקסל
                let csvContent = '\uFEFF'; 
                csvContent += 'תאריך,סוג חיוב,שם המוצר,כמות,מחיר יחידה (ש"ח),סה"כ לתשלום (ש"ח)\n';

                // מיון לפי תאריכים
                entries.sort((a,b) => a.date.localeCompare(b.date));

                entries.forEach(e => {
                    const price = products[e.product_name] || 0;
                    const total = price * e.quantity;
                    const typeStr = e.is_extra ? 'אקסטרה' : 'שוטף';
                    csvContent += `${e.date},${typeStr},${e.product_name},${e.quantity},${price.toFixed(2)},${total.toFixed(2)}\n`;
                });

                // יצירת הקובץ והורדה
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.setAttribute('href', url);
                link.setAttribute('download', `דוח_חיובים_הנהלת_חשבונות_${month}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (err) {
                console.error(err);
                alert('אירעה שגיאה בהפקת הדוח.');
            }
        }

        loadProducts();
    </script>
</body>
</html>
