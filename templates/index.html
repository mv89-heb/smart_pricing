<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת חכמה לניהול חיובי מכללה</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Heebo', 'sans-serif'] },
                    colors: { primary: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' } }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* עיצוב פס גלילה מודרני */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        /* הסתרת חצים בשדה מספר */
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-primary-600 text-white p-2 rounded-lg shadow-md">
                    <i class="fa-solid fa-chart-line text-xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-900 tracking-tight">ניהול חיובי מכללה</h1>
            </div>
            <div class="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1.5 rounded-full flex items-center gap-2">
                <i class="fa-solid fa-circle text-green-500 text-[10px] animate-pulse"></i>
                מחובר למסד הנתונים
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

            <div class="lg:col-span-4 flex flex-col gap-6">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[calc(100vh-140px)] sticky top-24">
                    
                    <div class="p-5 border-b border-slate-100 bg-slate-50/50">
                        <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                            <i class="fa-solid fa-tags text-primary-500"></i>
                            מחירון מוצרים
                        </h2>
                        <p class="text-sm text-slate-500 mt-1">עדכון והוספת מוצרים למאגר</p>
                    </div>

                    <div class="p-5 flex-grow flex flex-col gap-5 overflow-hidden">
                        <form id="product-form" class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">שם המוצר</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                                        <i class="fa-solid fa-box text-slate-400 text-sm"></i>
                                    </div>
                                    <input type="text" id="prod-name" required class="block w-full pr-9 pl-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 sm:text-sm transition-colors outline-none" placeholder="לדוג': קפה מגורען">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">מחיר יחידה (₪)</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                                        <i class="fa-solid fa-shekel-sign text-slate-400 text-sm"></i>
                                    </div>
                                    <input type="number" id="prod-price" step="0.01" required class="block w-full pr-9 pl-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 sm:text-sm transition-colors outline-none" placeholder="0.00">
                                </div>
                            </div>
                            <button type="submit" class="w-full flex justify-center items-center gap-2 py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-all active:scale-[0.98]">
                                <i class="fa-solid fa-plus"></i>
                                שמור למחירון
                            </button>
                        </form>

                        <div class="flex-grow overflow-y-auto border border-slate-200 rounded-xl">
                            <table class="min-w-full divide-y divide-slate-200 relative">
                                <thead class="bg-slate-50 sticky top-0 z-10">
                                    <tr>
                                        <th class="px-4 py-3 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">מוצר</th>
                                        <th class="px-4 py-3 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">מחיר</th>
                                        <th class="px-4 py-3 text-center text-xs font-semibold text-slate-500 uppercase tracking-wider w-12"></th>
                                    </tr>
                                </thead>
                                <tbody id="price-list-table-body" class="bg-white divide-y divide-slate-200">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 flex flex-col gap-6">
                
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 flex flex-col sm:flex-row items-center justify-between gap-4 border-r-4 border-r-primary-500">
                    <div>
                        <h2 class="text-xl font-bold text-slate-800">הזנת נתונים שוטפת</h2>
                        <p class="text-sm text-slate-500">בחר תאריך כדי להציג או להוסיף חיובים</p>
                    </div>
                    <div class="relative w-full sm:w-auto">
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                            <i class="fa-regular fa-calendar text-primary-500"></i>
                        </div>
                        <input type="date" id="current-date" onchange="loadEntriesForDate()" class="block w-full sm:w-64 pr-10 pl-4 py-3 border-2 border-primary-100 rounded-xl focus:ring-0 focus:border-primary-500 sm:text-lg font-bold text-primary-700 bg-primary-50 transition-colors outline-none cursor-pointer">
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex-grow flex flex-col">
                    
                    <div class="p-6 border-b border-slate-100 bg-slate-50/50">
                        <form id="entry-form" class="flex flex-col sm:flex-row items-end gap-4">
                            <div class="w-full sm:w-1/2">
                                <label class="block text-sm font-medium text-slate-700 mb-1">מוצר שנצרך</label>
                                <select id="entry-prod-select" required class="block w-full py-2.5 px-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 sm:text-sm transition-colors outline-none cursor-pointer bg-white">
                                    <option value="">-- טוען מוצרים... --</option>
                                </select>
                            </div>
                            <div class="w-full sm:w-1/4">
                                <label class="block text-sm font-medium text-slate-700 mb-1">כמות</label>
                                <input type="number" id="entry-qty" step="0.01" value="1" min="0.01" required class="block w-full py-2.5 px-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 sm:text-sm transition-colors outline-none text-center">
                            </div>
                            <div class="w-full sm:w-1/4">
                                <button type="submit" class="w-full flex justify-center items-center gap-2 py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-slate-800 hover:bg-slate-900 focus:outline-none transition-all active:scale-[0.98]">
                                    <i class="fa-solid fa-arrow-down"></i>
                                    הוסף לחיוב
                                </button>
                            </div>
                        </form>
                    </div>

                    <div class="flex-grow overflow-x-auto">
                        <table class="min-w-full divide-y divide-slate-200">
                            <thead class="bg-slate-50">
                                <tr>
                                    <th class="px-6 py-4 text-right text-sm font-semibold text-slate-600">שם המוצר</th>
                                    <th class="px-6 py-4 text-center text-sm font-semibold text-slate-600 w-24">כמות</th>
                                    <th class="px-6 py-4 text-right text-sm font-semibold text-slate-600 w-32">מחיר יחידה</th>
                                    <th class="px-6 py-4 text-right text-sm font-semibold text-slate-600 w-32">סה"כ</th>
                                    <th class="px-6 py-4 text-center text-sm font-semibold text-slate-600 w-16"></th>
                                </tr>
                            </thead>
                            <tbody id="entries-table-body" class="bg-white divide-y divide-slate-100">
                                </tbody>
                        </table>
                        
                        <div id="empty-state" class="hidden flex-col items-center justify-center py-12 text-slate-400">
                            <i class="fa-solid fa-receipt text-4xl mb-3 opacity-50"></i>
                            <p class="text-sm">אין חיובים בתאריך זה</p>
                        </div>
                    </div>

                    <div class="bg-slate-800 text-white p-6 flex flex-col sm:flex-row items-center justify-between gap-4 mt-auto">
                        <div class="flex items-center gap-3">
                            <div class="bg-white/10 p-3 rounded-full">
                                <i class="fa-solid fa-calculator text-xl text-primary-300"></i>
                            </div>
                            <div>
                                <p class="text-slate-300 text-sm font-medium mb-1">סה"כ חיובים לתאריך:</p>
                                <p class="text-3xl font-bold text-white"><span id="daily-total">0.00</span> ₪</p>
                            </div>
                        </div>
                        <button onclick="window.print()" class="w-full sm:w-auto flex items-center justify-center gap-2 bg-white text-slate-800 hover:bg-slate-100 py-2.5 px-6 rounded-lg font-bold shadow-sm transition-colors print:hidden">
                            <i class="fa-solid fa-print"></i>
                            הדפס דו"ח יומי
                        </button>
                    </div>
                </div>
                
            </div>
        </div>
    </main>

    <script>
        let products = {};

        // הגדרת תאריך להיום כברירת מחדל
        document.getElementById('current-date').valueAsDate = new Date();

        // טעינת מחירון
        async function loadProducts() {
            try {
                const res = await fetch('/api/products');
                products = await res.json();
                renderProducts();
                loadEntriesForDate();
            } catch (error) {
                console.error("שגיאה בטעינת הנתונים:", error);
            }
        }

        // רנדור רשימת המחירון
        function renderProducts() {
            const tbody = document.getElementById('price-list-table-body');
            const select = document.getElementById('entry-prod-select');
            tbody.innerHTML = '';
            select.innerHTML = '<option value="">-- בחר מוצר --</option>';

            Object.keys(products).sort().forEach(name => {
                // הוספה לטבלה
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors group">
                        <td class="px-4 py-3 whitespace-nowrap text-sm font-medium text-slate-800">${name}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-sm text-slate-600">${products[name].toFixed(2)} ₪</td>
                        <td class="px-4 py-3 whitespace-nowrap text-center text-sm font-medium">
                            <button onclick="deleteProduct('${name}')" class="text-red-400 hover:text-red-600 hover:bg-red-50 p-1.5 rounded transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100" title="מחק מוצר">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </td>
                    </tr>`;
                
                // הוספה לסלקטור
                select.innerHTML += `<option value="${name}">${name}</option>`;
            });
        }

        // שמירת מוצר במחירון
        document.getElementById('product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> שומר...';
            
            const name = document.getElementById('prod-name').value.trim();
            const price = parseFloat(document.getElementById('prod-price').value);
            
            await fetch('/api/products', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, price })
            });
            
            document.getElementById('product-form').reset();
            btn.innerHTML = originalContent;
            loadProducts();
        });

        // מחיקת מוצר מהמחירון
        async function deleteProduct(name) {
            if(confirm(`האם אתה בטוח שברצונך למחוק את "${name}" מהמחירון?`)) {
                await fetch(`/api/products/${name}`, { method: 'DELETE' });
                loadProducts();
            }
        }

        // טעינת פעילות יומית
        async function loadEntriesForDate() {
            const selectedDate = document.getElementById('current-date').value;
            if (!selectedDate) return;

            const res = await fetch(`/api/entries/${selectedDate}`);
            const entries = await res.json();
            renderEntries(entries);
        }

        // רנדור הפעילות היומית
        function renderEntries(entries) {
            const tbody = document.getElementById('entries-table-body');
            const emptyState = document.getElementById('empty-state');
            tbody.innerHTML = '';
            let total = 0;

            if(entries.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
            }

            entries.forEach(entry => {
                const price = products[entry.product_name] || 0;
                const itemTotal = price * entry.quantity;
                total += itemTotal;

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-slate-800">${entry.product_name}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-700 text-center font-medium bg-slate-50/50">${entry.quantity}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600 text-right">${price.toFixed(2)} ₪</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-primary-700 text-right bg-primary-50/30">${itemTotal.toFixed(2)} ₪</td>
                        <td class="px-6 py-4 whitespace-nowrap text-center text-sm font-medium">
                            <button onclick="deleteEntry(${entry.id})" class="text-red-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-full transition-colors" title="הסר חיוב">
                                <i class="fa-solid fa-xmark text-lg"></i>
                            </button>
                        </td>
                    </tr>`;
            });
            document.getElementById('daily-total').textContent = total.toFixed(2);
        }

        // הוספת פעילות
        document.getElementById('entry-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> מוסיף...';

            const date = document.getElementById('current-date').value;
            const product_name = document.getElementById('entry-prod-select').value;
            const quantity = document.getElementById('entry-qty').value;

            if(!product_name || !date) return;

            await fetch('/api/entries', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ date, product_name, quantity })
            });
            
            document.getElementById('entry-qty').value = 1;
            document.getElementById('entry-prod-select').value = '';
            btn.innerHTML = originalContent;
            loadEntriesForDate();
        });

        // מחיקת פעילות
        async function deleteEntry(entryId) {
            if(confirm('האם להסיר את החיוב הזה מהתאריך הנוכחי?')) {
                await fetch(`/api/entries/${entryId}`, { method: 'DELETE' });
                loadEntriesForDate();
            }
        }

        // אתחול
        loadProducts();
    </script>
</body>
</html>
